<!DOCTYPE html>
<html>
<head>
    <title>4장과제</title>
</head>
<body>
    <h1>9번 문제</h1>
    <form>
        <table>
            <tr>
                <td><label for="username">아이디</label></td>
                <td><input id="username" type="text" name="username"></td>
            </tr>
            <tr>
                <td><label for="password">비밀번호</label></td>
                <td><input id="password" type="text" name="password"></td>
            </tr>
        </table>
        <input type="submit" value="제출">
    </form>
    <h1>10번문제</h1>
    <form>
        <table>
            <tr>
                <td>
                    <legend style="font-weight: bold;">시작그룹</legend>
                    <input type="radio" id="newtap" name="startgroup">
                    <label for="newtap">새 탭 페이지 열기</label><br>

                    <input type="radio" id="continue" name="startgroup">
                    <label for="continue">중단한 위치에서 계속하기</label><br>

                    <input type="radio" id="spcificpage" name="startgroup">
                    <label for="spcificpage">특정 페이지 또는 페이지 모음 열기</label><br>
                </td>
            </tr>
        </table>
        <table>
            <tr>
                <td>
                    <legend style="font-weight: bold;">개인정보 및 보안</legend>
                    <input type="checkbox" id="syncservices" name="privacysecurity">
                    <label for="syncservices">동기화 및 서비스</label><br>

                    <input type="checkbox" id="acceptlogin" name="privacysecurity">
                    <label for="acceptlogin">로그인 허용</label><br>

                    <input type="checkbox" id="preloadpages" name="privacysecurity">
                    <label for="preloadpages">페이지 미리 로드</label><br>
                </td>
            </tr>
        </table>
    </form>
    <h1>11번 문제</h1>
    <h2>글 작성하기</h2>
    <form>
        <table>
            <tr>
                <td><label for="name"><b>작성자</b></label></td>
                <td><input id="name" type="text" name="name"></td><br>
            </tr>
            <tr>
                <td><label for="id"><b>아이디</b></label></td>
                <td><input id="id" type="text" name="id"></td><br>
            </tr>
            <tr>
                <td><label for="email"><b>이메일</b></label></td>
                <td>
                    <input id="email" type="text" name="email">@
                    <input type="text" name="emaildomain">
                </td>
            </tr>
            <tr>
                <td><label><b>휴대폰</b></label></td>
                <td>
                    <select name="phone">
                        <option>010</option>
                        <option>011</option>
                    </select>-
                    <input type="text" name="phone2">-
                    <input type="text" name="phone3">
                </td>
            </tr>
            <tr>
                <td><label for="title"><b>글제목</b></label></td>
                <td><input id="title" type="text" name="title"></td>
            </tr>
            <tr>
                <td style="vertical-align: middle;"><label for="content"><b>내용</b></label></td>
                <td><textarea id="content" name="content" style="width: 300px; height: 150px;"></textarea></td>
            </tr>
        </table>
            <input type="submit" value="제출">
    </form>
</body>
</html>
